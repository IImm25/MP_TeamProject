# author: Erik Schellenberger
services:
  postgres:
    image: postgres:16
    container_name: windpower-postgress
    restart: unless-stopped
    environment:
      POSTGRES_DB: windpowerdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: