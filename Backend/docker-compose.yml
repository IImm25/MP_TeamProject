# author: Erik Schellenberger
services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: windpower-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8081:80"
    volumes:
      - ./pgadmin/config/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: postgres:16
    container_name: windpower-postgress
    restart: unless-stopped
    environment:
      POSTGRES_DB: windpowerdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d windpowerdb"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: