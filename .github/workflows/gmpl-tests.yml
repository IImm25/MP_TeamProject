name: GMPL Model Tests

on:
  push:
    branches-ignore:
      - main          # Direkte Pushes nach main sind laut README ohnehin verboten
    paths:
      - 'GMPL/**'
  pull_request:
    paths:
      - 'GMPL/**'
  workflow_dispatch:  # Manueller Start über GitHub UI möglich

jobs:
  test-gmpl:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install glpsol
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq glpk-utils
          echo "Installiert: $(glpsol --version 2>&1 | head -n 1)"

      - name: Run GMPL Tests
        run: |
          chmod +x GMPL/run_tests.sh
          cd GMPL
          bash run_tests.sh | tee ../test-results.txt
          exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gmpl-test-results
          path: test-results.txt
          retention-days: 30

      - name: Comment results on Pull Request
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let results = '';
            try {
              results = fs.readFileSync('test-results.txt', 'utf8');
            } catch (e) {
              results = 'Testergebnisse konnten nicht gelesen werden.';
            }

            const statsLine = results.split('\n').find(l => l.startsWith('Statistik:')) || '';
            const success = !results.includes('[FAIL]');
            const icon = success ? '✅' : '❌';

            const body = `## ${icon} GMPL Model Tests\n\n` +
              `**${statsLine}**\n\n` +
              `<details>\n<summary>Vollständige Ausgabe</summary>\n\n` +
              `\`\`\`\n${results}\n\`\`\`\n</details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });