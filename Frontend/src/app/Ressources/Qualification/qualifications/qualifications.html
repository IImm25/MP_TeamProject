<div class="content-wrapper">
  <header class="section-header">
    <div class="title-group">
      <h1 class="title">{{ 'QUALIFICATIONS.TITLE' | translate }}</h1>
    </div>
    <p-button
      [label]="'QUALIFICATIONS.ADD_NEW' | translate"
      icon="pi pi-plus"
      (onClick)="selectedQualification.set(null); dialogVisible.set(true); dialogType.set('New');"
      severity="secondary"
      [raised]="true"
    />
  </header>

  <div class="table-container">
    <p-table
      [value]="qualifications()"
      [paginator]="true"
      [rows]="5"
      sortField="name"
      [sortOrder]="1"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">
            {{ 'QUALIFICATIONS.NAME' | translate }} <p-sortIcon field="name" />
          </th>
          <th>{{ 'QUALIFICATIONS.DESCRIPTION' | translate }}</th>
          <th class="right">{{ 'COMMON.ACTIONS' | translate }}</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-qualification>
        <tr>
          <td>{{ qualification.name }}</td>
          <td>{{ qualification.description }}</td>
          <td>
            <div class="action-buttons">
              <p-button
                icon="pi pi-pencil"
                [text]="true"
                [rounded]="true"
                severity="secondary"
                (onClick)="this.dialogVisible.set(true); this.selectedQualification.set(qualification); this.dialogType.set('Edit');"
              />
              <p-button
                icon="pi pi-trash"
                [text]="true"
                [rounded]="true"
                severity="secondary"
                (onClick)="deleteQualification(qualification)"
              />
              <p-button
                icon="pi pi-ellipsis-h"
                [text]="true"
                [rounded]="true"
                severity="secondary"
                (onClick)="this.dialogVisible.set(true); this.selectedQualification.set(qualification); this.dialogType.set('Detail');"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

@if (dialogVisible()) {
  <app-dialog-qualification
    [(visible)]="dialogVisible"
    [type]="dialogType()"
    [selectedQualification]="selectedQualification()"
    (onSave)="loadQualifications()"
  />
}

<p-confirmDialog />
