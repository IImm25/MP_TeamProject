<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '30vw' }"
>
  <ng-template pTemplate="header">
    @if (type === 'Edit') {
      <h3>{{ 'TASKS.DIALOG.QUALIFICATION.EDIT' | translate }}</h3>
    } @else {
      <h3>{{ 'TASKS.DIALOG.QUALIFICATION.NEW' | translate }}</h3>
    }
  </ng-template>

  <ng-template pTemplate="content">
    <form [formGroup]="qualificationForm" class="qualification-form">
      <div class="form-group">
        <label>{{ 'TASKS.DIALOG.QUALIFICATION.QUALIFICATION' | translate }}</label>
        <p-select
          [options]="allQualifications()"
          formControlName="selectedQualificationForm"
          optionLabel="name"
          appendTo="body"
          [filter]="true"
          filterBy="name"
          placeholder="{{ 'TASKS.DIALOG.QUALIFICATION.PLACEHOLDER' | translate }}"
        />
      </div>

      <div class="form-group">
        <label>{{ 'TASKS.DIALOG.QUALIFICATION.REQUIRED_AMOUNT' | translate }}</label>
        <p-inputNumber formControlName="selectedQualificationAmount" [min]="1" [showButtons]="true" />
      </div>
    </form>
  </ng-template>

  <ng-template pTemplate="footer">
    <div class="footer-actions">
      <p-button
        [label]="'COMMON.CANCEL' | translate"
        [text]="true"
        severity="secondary"
        (onClick)="close()"
      />
      <p-button
        [label]="'COMMON.SAVE' | translate"
        icon="pi pi-check"
        (onClick)="addQualification()"
        [disabled]="qualificationForm.invalid"
      />
    </div>
  </ng-template>
</p-dialog>
