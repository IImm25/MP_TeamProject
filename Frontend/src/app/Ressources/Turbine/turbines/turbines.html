<p-toast />

<div class="content-wrapper">
  <header class="section-header">
    <div class="title-group">
      <h1 class="title">{{ 'TURBINES.TURBINES' | translate }}</h1>
    </div>
    <p-button
      [label]="'TURBINES.NEW_TURBINE' | translate"
      icon="pi pi-plus"
      [raised]="true"
      severity="secondary"
      (onClick)="selectedTurbine.set(null); visible.set(true)"
    />
  </header>

  <div class="table-container">
    <p-table [value]="turbines()" [paginator]="true" [rows]="5" sortField="name" [sortOrder]="1">
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="name">{{ 'TURBINES.NAME' | translate }} <p-sortIcon field="name"/></th>
          <th>{{ 'TURBINES.COORDINATES' | translate }}</th>
          <th class="right">{{ 'COMMON.ACTIONS' | translate }}</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-turbine>
        <tr>
          <td>{{ turbine.name }}</td>
          <td><span class="coordinate-text">{{ turbine.latitude | number:'1.4-6' }}, {{ turbine.longitude | number:'1.4-6' }}</span></td>
          <td>
            <div class="action-buttons">
              <p-button
                icon="pi pi-pencil"
                [text]="true"
                [rounded]="true"
                severity="secondary"
                class="btn-edit"
                (onClick)="openEditOrDetail(turbine, 'Edit')"
              />
              <p-button
                icon="pi pi-trash"
                [text]="true"
                [rounded]="true"
                severity="secondary"
                class="btn-delete"
                (onClick)="deleteTurbine(turbine)"
              />
              <p-button
                icon="pi pi-ellipsis-h"
                [text]="true"
                [rounded]="true"
                severity="secondary"
                (onClick)="openEditOrDetail(turbine, 'Detail')"
              />
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

@if (visible()) {
  <app-dialog-turbine [type]="type()" [selectedTurbine]="selectedTurbine()" [(visible)]="visible" (onSave)="loadTurbines()" />
}

<p-confirmDialog />
